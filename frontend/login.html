<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - FINDS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            color: #1da1f2;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1da1f2;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 15px;
        }

        .btn-primary {
            background-color: #1da1f2;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1a91da;
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: transparent;
            color: #1da1f2;
            border: 2px solid #1da1f2;
        }

        .btn-outline:hover {
            background-color: #1da1f2;
            color: white;
            transform: translateY(-1px);
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .back-link {
            color: #1da1f2;
            text-decoration: none;
            font-size: 14px;
            margin-top: 20px;
            display: inline-block;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #1a91da;
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #666;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px 20px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-google:hover {
            background-color: #f8f9fa;
            border-color: #d0d0d0;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .btn-google svg {
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }

            .logo {
                font-size: 28px;
            }

            .form-group input {
                padding: 10px 14px;
                font-size: 16px;
            }

            .btn {
                padding: 12px 18px;
                font-size: 15px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 25px 15px;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">FINDS</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        
        <div class="divider">
            <span>или</span>
        </div>
        
        <a href="http://localhost:8090/oauth2/authorization/google" class="btn btn-google">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9087c1.7019-1.566 2.6836-3.874 2.6836-6.615z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9087-2.2581c-.8059.54-1.8368.859-3.0477.859-2.344 0-4.3282-1.583-5.036-3.7114H.9574v2.3316C2.4382 16.083 5.4818 18 9 18z"/>
                <path fill="#FBBC05" d="M3.964 10.712c-.182-.54-.286-1.1168-.286-1.712s.104-1.172.286-1.712V4.9564H.9574A8.996 8.996 0 0 0 0 9c0 1.4523.3477 2.8268.9574 4.0436l3.0066-2.3316z"/>
                <path fill="#EA4335" d="M9 3.5795c1.3213 0 2.5078.454 3.4405 1.347l2.5813-2.5813C13.4632.8916 11.426 0 9 0 5.4818 0 2.4382 1.9169.9574 4.9564l3.0066 2.3316c.7078-2.1284 2.692-3.7114 5.036-3.7114z"/>
            </svg>
            Войти через Google
        </a>
        
        <div class="error-message" id="errorMessage"></div>
        
        <a href="index.html" class="back-link">← Назад на главную</a>
    </div>

    <script src="config.js"></script>
    <script src="cookie-utils.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/auth/signin`, {
                    method: 'POST',
                    credentials: 'include', // Важно для работы с cookie
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    // Токены устанавливаются через cookie автоматически
                    // Перенаправляем на главную страницу
                    window.location.href = 'index.html';
                } else {
                    const errorData = await response.json();
                    errorMessage.textContent = errorData.message || 'Ошибка входа';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Ошибка соединения с сервером';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
